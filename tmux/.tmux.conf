# resolve neovim checkhealth warnings/errors
# set-option -sa terminal-overrides ',rxvt-unicode-256color:RGB'
set-option -g focus-events on

# unbind default prefix and set it to ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# make delay shorter
set -sg escape-time 0

# enable mouse (drag-to-select, scroll into copy-mode, click-to-focus)
set -g mouse on

#### key bindings ####

# reload config file
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# pane movement shortcuts (vim keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize pane movement shortcuts (vim keys)
bind C-h resize-pane -L
bind C-j resize-pane -D
bind C-k resize-pane -U
bind C-l resize-pane -R

# switch panes using Alt-arrow without prefix                                                
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U                                                               
bind -n M-j select-pane -D

# splitting panes with | and -
bind | split-window -h
bind - split-window -v

# Cycle windows
bind -n S-Right next-window
bind -n S-Left previous-window

# Switch windows with Alt+number (no prefix needed)
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Set copy mode to vi
#### copy mode : vim ####

# set vi mode for copy mode
setw -g mode-keys vi

# copy mode using 'Esc'
unbind [
bind Escape copy-mode

bind-key -T edit-mode-vi Up send-keys -X history-up
bind-key -T edit-mode-vi Down send-keys -X history-down

# v selects, y/Enter yank to system clipboard, C-v toggles block selection
unbind-key -T copy-mode-vi Space     ;   bind-key -T copy-mode-vi v send-keys -X begin-selection
unbind-key -T copy-mode-vi Enter     ;   bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
unbind-key -T copy-mode-vi C-v       ;   bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# mouse drag-release also copies to system clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# paste from system clipboard
unbind p
bind p run "xclip -selection clipboard -out | tmux load-buffer - && tmux paste-buffer"

# status bar
# set -g status-style 'bg=black,fg=white'
set -g status-position bottom

# Show current directory and program in window tab names (e.g., "myproject:vim")
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}:#{pane_current_command}'

### Plugins
# tmux-resurrect: save/restore the tmux environment (layout, window names, cwd).
set -g @plugin 'tmux-plugins/tmux-resurrect'
# tmux-continuum: automatic periodic save + automatic restore on tmux startup.
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- session persistence settings ---
# Relaunch these programs on restore (the default list is conservative).
#   ~name   match 'name' anywhere in the saved process string
#   ->cmd   run 'cmd' instead of the raw saved command when restoring
# claude is restored verbatim as `claude --session-id <uuid>`; the `claude` zsh
# wrapper (see shell-functions/.functions) rewrites that to `--resume <uuid>`,
# so each pane resumes its OWN session even when several share one directory.
set -g @resurrect-processes 'ssh "~claude" "~codex->codex resume --last"'
# Also save/restore each pane's visible scrollback text.
set -g @resurrect-capture-pane-contents 'on'
# Auto-restore the last saved environment when a fresh tmux server starts.
set -g @continuum-restore 'on'
# Auto-save every 15 minutes.
set -g @continuum-save-interval '15'
# TokyoNight colors for Tmux

set -g mode-style "fg=#82aaff,bg=#3b4261"

set -g message-style "fg=#82aaff,bg=#3b4261"
set -g message-command-style "fg=#82aaff,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#82aaff,bg=#1e2030"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1b1d2b,bg=#82aaff,bold] #S #[fg=#82aaff,bg=#1e2030,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#1e2030] #{prefix_highlight} #[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#3b4261] %Y-%m-%d  %I:%M %p #[fg=#82aaff,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#1b1d2b,bg=#82aaff,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#1e2030] #{prefix_highlight} #[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#3b4261] %Y-%m-%d  %H:%M #[fg=#82aaff,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#1b1d2b,bg=#82aaff,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#828bb8,bg=#1e2030"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#828bb8,bg=#1e2030"
setw -g window-status-format "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1e2030,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#3b4261,bold] #I  #W #F #[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#ffc777]#[bg=#1e2030]#[fg=#1e2030]#[bg=#ffc777]"
set -g @prefix_highlight_output_suffix ""
# set -g @plugin "janoamaral/tokyo-night-tmux"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
